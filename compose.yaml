name: project-atlas

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"

  atlas-api:
    build:
      context: .
      dockerfile: apps/atlas-api/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://atlas:atlas@postgres:5432/atlas}
    depends_on:
      postgres:
        condition: service_healthy
      honcho-api:
        condition: service_healthy
    ports:
      - "${ATLAS_API_BIND:-127.0.0.1}:${ATLAS_API_PORT:-3000}:3000"
    volumes:
      - ./ecosystem:/app/ecosystem:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  honcho-api:
    build:
      context: ${HONCHO_SOURCE_DIR:-./vendor/honcho}
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["sh", "docker/entrypoint.sh"]
    env_file:
      - path: .env
        required: false
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@honcho-postgres:5432/postgres
      CACHE_URL: redis://honcho-redis:6379/0?suppress=true
      CACHE_ENABLED: "true"
      AUTH_USE_AUTH: ${HONCHO_AUTH_USE_AUTH:-false}
      AUTH_JWT_SECRET: ${HONCHO_AUTH_JWT_SECRET:-}
    depends_on:
      honcho-postgres:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HONCHO_HOST_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  honcho-deriver:
    build:
      context: ${HONCHO_SOURCE_DIR:-./vendor/honcho}
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    env_file:
      - path: .env
        required: false
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@honcho-postgres:5432/postgres
      CACHE_URL: redis://honcho-redis:6379/0?suppress=true
      CACHE_ENABLED: "true"
      AUTH_USE_AUTH: ${HONCHO_AUTH_USE_AUTH:-false}
      AUTH_JWT_SECRET: ${HONCHO_AUTH_JWT_SECRET:-}
    depends_on:
      honcho-api:
        condition: service_healthy
      honcho-postgres:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  honcho-postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - honcho-postgres-data:/var/lib/postgresql/data/
      - ${HONCHO_SOURCE_DIR:-./vendor/honcho}/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  honcho-redis:
    image: redis:8.2
    restart: unless-stopped
    volumes:
      - honcho-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: gateway run
    env_file:
      - path: .env
        required: false
      - path: ./data/hermes/atlas.env
        required: false
    environment:
      HERMES_HOME: /opt/data
      HONCHO_BASE_URL: ${HONCHO_BASE_URL:-http://honcho-api:8000}
      HONCHO_API_KEY: ${HONCHO_API_KEY:-}
    depends_on:
      honcho-api:
        condition: service_healthy
    volumes:
      - ./data/hermes:/opt/data
    ports:
      - "127.0.0.1:${HERMES_DASHBOARD_PORT:-9119}:9119"
      - "127.0.0.1:${HERMES_GATEWAY_PORT:-8642}:8642"
      - "127.0.0.1:${WHATSAPP_CLOUD_WEBHOOK_PORT:-8090}:8090"
    security_opt:
      - no-new-privileges:true
    profiles:
      - runtime

volumes:
  postgres-data:
  honcho-postgres-data:
  honcho-redis-data:
