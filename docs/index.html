<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Project Atlas official documentation for deploying a private Hermes agent ecosystem with Honcho memory, Tailscale, WhatsApp, and an iOS bridge."
    />
    <title>Project Atlas Docs</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div id="app">Loading Project Atlas documentation...</div>
    <script>
      window.$docsify = {
        name: "Project Atlas",
        repo: "itspalomo/project-atlas",
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        onlyCover: false,
        subMaxLevel: 3,
        auto2top: true,
        executeScript: true,
        mergeNavbar: true,
        themeColor: "#1f6f68",
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Search Atlas docs",
          noData: "No matching docs found",
          depth: 4
        },
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
          "/.*/_navbar.md": "/_navbar.md"
        },
        pagination: {
          previousText: "Previous",
          nextText: "Next",
          crossChapter: true,
          crossChapterText: true
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="./assets/docs.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  </body>
</html>
